<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ES Trading Plans</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #111a2b;
      --panel-2: #18243a;
      --line: #27344d;
      --text: #eef4ff;
      --muted: #a7b6d4;
      --accent: #6cb6ff;
      --accent-2: #93c5fd;
      --shadow: 0 10px 30px rgba(0,0,0,.25);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #0b1220 0%, #0d1526 100%);
    }
    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
    }
    .topbar {
      padding: 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(11,18,32,.92);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .topbar-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      gap: 14px;
    }
    .headline {
      display: flex;
      flex-wrap: wrap;
      align-items: end;
      gap: 10px 14px;
    }
    h1 {
      margin: 0;
      font-size: clamp(22px, 2.6vw, 34px);
      line-height: 1.1;
    }
    .badge {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--accent-2);
    }
    .muted {
      color: var(--muted);
      font-size: 14px;
    }
    .controls {
      display: grid;
      grid-template-columns: minmax(260px, 420px) auto auto auto 1fr;
      gap: 12px;
      align-items: center;
    }
    select, button, a.button {
      min-height: 44px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      padding: 0 14px;
      font: inherit;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: var(--shadow);
    }
    select { width: 100%; }
    button:hover, a.button:hover, select:hover {
      border-color: var(--accent);
    }
    button:disabled {
      opacity: .45;
      cursor: not-allowed;
    }
    .current {
      display: flex;
      justify-content: flex-end;
      min-width: 0;
    }
    .current-card {
      min-width: 0;
      max-width: 100%;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 14px;
      box-shadow: var(--shadow);
    }
    .current-title {
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
    .current-meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
    .viewer {
      padding: 16px;
    }
    .viewer-inner {
      max-width: 1400px;
      margin: 0 auto;
      height: calc(100vh - 170px);
      min-height: 600px;
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }
    .empty {
      display: grid;
      place-items: center;
      height: 100%;
      color: #1f2937;
      font-size: 18px;
      padding: 24px;
      text-align: center;
    }
    .hint {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
    }
    @media (max-width: 1100px) {
      .controls {
        grid-template-columns: 1fr 1fr 1fr;
      }
      .current {
        grid-column: 1 / -1;
        justify-content: flex-start;
      }
      .viewer-inner {
        height: calc(100vh - 250px);
      }
    }
    @media (max-width: 640px) {
      .controls {
        grid-template-columns: 1fr;
      }
      .viewer-inner {
        height: calc(100vh - 340px);
        min-height: 500px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="topbar-inner">
        <div>
          <div class="headline">
            <h1>ES Trading Plans</h1>
          </div>
          <div class="muted">Trading is a game of probabilities — define the risk, honor the stop, and live to trade the next setup.</div>
        </div>

        <div class="controls">
          <select id="planSelect" aria-label="Choose a plan"></select>
          <button id="latestBtn" type="button">Latest</button>
          <button id="olderBtn" type="button">Older</button>
          <a id="openBtn" class="button" href="#" target="_blank" rel="noopener noreferrer">Open in new tab</a>
          <div class="current">
            <div class="current-card">
              <div class="muted">Currently viewing</div>
              <div class="current-title" id="currentTitle">Loading…</div>
              <div class="current-meta" id="currentMeta"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="viewer">
      <div class="viewer-inner" id="viewerInner">
        <iframe id="planFrame" title="Selected trading plan"></iframe>
      </div>
    </div>
  </div>

  <script>
    const plans = [
  {
    "fileName": "ES_Plan_Jun17_2026_ETH_RTH update.html",
    "slug": "es-plan-jun17-2026-eth-rth-update.html",
    "title": "ES Trading Plan — Jun 17, 2026 — ETH + RTH (Overnight Repair · Warsh FOMC)",
    "href": "plans/es-plan-jun17-2026-eth-rth-update.html",
    "sortDate": "2026-06-17T00:00:00.000Z",
    "uploadTime": "2026-06-17T19:36:12.000Z",
    "dateLabel": "Jun 17, 2026",
    "dateGroupLabel": "Jun 17, 2026",
    "versionLabel": "ETH + RTH (Overnight Repair · Warsh FOMC)"
  },
  {
    "fileName": "ES_Plan_Jun16_2026_ETH_RTH.html",
    "slug": "es-plan-jun16-2026-eth-rth.html",
    "title": "ES Trading Plan — Jun 16, 2026 — ETH + RTH (Iran Deal Finalized · Near ATH)",
    "href": "plans/es-plan-jun16-2026-eth-rth.html",
    "sortDate": "2026-06-16T00:00:00.000Z",
    "uploadTime": "2026-06-17T19:36:12.000Z",
    "dateLabel": "Jun 16, 2026",
    "dateGroupLabel": "Jun 16, 2026",
    "versionLabel": "ETH + RTH (Iran Deal Finalized · Near ATH)"
  },
  {
    "fileName": "ES_RTH_Plan_Jun12_2026_OPEN_UPDATE.html",
    "slug": "es-rth-plan-jun12-2026-open-update.html",
    "title": "ES RTH Plan — Jun 12, 2026 — OPEN UPDATE 08:22 CT",
    "href": "plans/es-rth-plan-jun12-2026-open-update.html",
    "sortDate": "2026-06-12T00:00:00.000Z",
    "uploadTime": "2026-06-17T19:36:12.000Z",
    "dateLabel": "Jun 12, 2026",
    "dateGroupLabel": "Jun 12, 2026",
    "versionLabel": "RTH · OPEN UPDATE 08:22 CT"
  },
  {
    "fileName": "ES_RTH_Plan_Jun12_2026_UPDATED.html",
    "slug": "es-rth-plan-jun12-2026-updated.html",
    "title": "ES RTH Plan — Jun 12, 2026 — UPDATED 06:29 ET",
    "href": "plans/es-rth-plan-jun12-2026-updated.html",
    "sortDate": "2026-06-12T00:00:00.000Z",
    "uploadTime": "2026-06-17T19:36:12.004Z",
    "dateLabel": "Jun 12, 2026",
    "dateGroupLabel": "Jun 12, 2026",
    "versionLabel": "RTH · UPDATED 06:29 ET"
  },
  {
    "fileName": "ES_Plan_Jun12_2026_ETH_RTH.html",
    "slug": "es-plan-jun12-2026-eth-rth.html",
    "title": "ES Trading Plan — Jun 12, 2026 — ETH + RTH (Post-Iran-Deal Spike)",
    "href": "plans/es-plan-jun12-2026-eth-rth.html",
    "sortDate": "2026-06-12T00:00:00.000Z",
    "uploadTime": "2026-06-17T19:36:12.000Z",
    "dateLabel": "Jun 12, 2026",
    "dateGroupLabel": "Jun 12, 2026",
    "versionLabel": "ETH + RTH (Post-Iran-Deal Spike)"
  },
  {
    "fileName": "ES_RTH_Plan_Jun11_2026_UPDATED.html",
    "slug": "es-rth-plan-jun11-2026-updated.html",
    "title": "ES RTH Plan — Jun 11, 2026 — UPDATED 05:34 ET",
    "href": "plans/es-rth-plan-jun11-2026-updated.html",
    "sortDate": "2026-06-11T00:00:00.000Z",
    "uploadTime": "2026-06-17T19:36:12.000Z",
    "dateLabel": "Jun 11, 2026",
    "dateGroupLabel": "Jun 11, 2026",
    "versionLabel": "RTH · UPDATED 05:34 ET"
  },
  {
    "fileName": "ES_Trading_Plan_Jun10-11_2026.html",
    "slug": "es-trading-plan-jun10-11-2026.html",
    "title": "ES Trading Plan — Jun 10–11, 2026 — ETH + RTH",
    "href": "plans/es-trading-plan-jun10-11-2026.html",
    "sortDate": "2026-06-11T00:00:00.000Z",
    "uploadTime": "2026-06-17T19:36:12.004Z",
    "dateLabel": "Jun 11, 2026",
    "dateGroupLabel": "Jun 10–11, 2026",
    "versionLabel": "ETH + RTH"
  }
];
    const select = document.getElementById('planSelect');
    const frame = document.getElementById('planFrame');
    const openBtn = document.getElementById('openBtn');
    const currentTitle = document.getElementById('currentTitle');
    const currentMeta = document.getElementById('currentMeta');
    const latestBtn = document.getElementById('latestBtn');
    const olderBtn = document.getElementById('olderBtn');

    if (!plans.length) {
      document.getElementById('viewerInner').innerHTML = '<div class="empty">No plan files were found.<br />Put your HTML files into the <code>plans/</code> folder and rebuild.</div>';
    } else {
      const groupMap = new Map();
      plans.forEach((plan, index) => {
        let group = groupMap.get(plan.dateGroupLabel);
        if (!group) {
          group = document.createElement('optgroup');
          group.label = plan.dateGroupLabel;
          groupMap.set(plan.dateGroupLabel, group);
          select.appendChild(group);
        }

        const option = document.createElement('option');
        option.value = String(index);
        option.textContent = plan.versionLabel;
        option.title = plan.title;
        group.appendChild(option);
      });

      function update(index, replace = false) {
        const plan = plans[index];
        if (!plan) return;
        select.value = String(index);
        frame.src = plan.href;
        openBtn.href = plan.href;
        currentTitle.textContent = plan.dateGroupLabel + ' — ' + plan.versionLabel;
        currentMeta.textContent = plan.title;
        latestBtn.disabled = index === 0;
        olderBtn.disabled = index >= plans.length - 1;

        const url = new URL(window.location.href);
        url.searchParams.set('plan', plan.slug);
        if (replace) {
          history.replaceState({}, '', url);
        } else {
          history.pushState({}, '', url);
        }
      }

      select.addEventListener('change', () => update(Number(select.value)));
      latestBtn.addEventListener('click', () => update(0));
      olderBtn.addEventListener('click', () => {
        const currentIndex = Number(select.value);
        const nextIndex = Math.min(currentIndex + 1, plans.length - 1);
        update(nextIndex);
      });

      const requestedSlug = new URL(window.location.href).searchParams.get('plan');
      const requestedIndex = plans.findIndex(plan => plan.slug === requestedSlug);
      update(requestedIndex >= 0 ? requestedIndex : 0, true);
    }
  </script>
</body>
</html>
